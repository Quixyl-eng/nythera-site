<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nythera Client</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Inter,sans-serif;
background:#050507;
color:white;
}

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:50px;
}

.logo{
display:flex;
align-items:center;
gap:12px;
font-size:22px;
font-weight:700;
}

.logo img{
width:44px;
border-radius:12px;
}

.btn{
background:white;
color:black;
padding:12px 20px;
border-radius:10px;
text-decoration:none;
font-weight:600;
display:inline-block;
}

.card{
background:#08080c;
border:1px solid rgba(255,255,255,.06);
padding:25px;
border-radius:16px;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
background:#050507;
border:1px solid rgba(255,255,255,.1);
border-radius:10px;
color:white;
margin-bottom:10px;
}

.status{
margin-top:10px;
color:#9aa0aa;
}

.download{
margin-top:15px;
display:none;
}

.buy{
margin-top:10px;
display:inline-block;
}
</style>
</head>

<body>

<div class="container">

<nav>
<div class="logo">
<img src="logo.png">
NYTHERA
</div>

<a class="btn" href="https://t.me/nythera_gate_bot">Купить</a>
</nav>


<div class="card">
<h2>Активация ключа</h2>

<input id="key" placeholder="Введите ключ">
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button class="btn" onclick="activate()">Активировать</button>

<div class="status" id="status"></div>

<div class="download" id="download">
<a class="btn" href="NytheraLoader.exe">Скачать Loader</a>
</div>

</div>


<div class="card">
<h2>Прайс</h2>

<div>Месяц — 79₽</div>
<div>Год — 289₽</div>
<div>Навсегда — 599₽</div>

<a class="btn buy" href="https://t.me/nythera_gate_bot">
Купить через CryptoBot
</a>

</div>


<script>
function activate(){

let key=document.getElementById("key").value
let user=document.getElementById("user").value
let pass=document.getElementById("pass").value

if(!key||!user||!pass){
document.getElementById("status").innerText="Заполните поля"
return
}

/* пока демо логика */

document.getElementById("status").innerText="Ключ активирован"
document.getElementById("download").style.display="block"

}
</script>

</div>

</body>
</html>
