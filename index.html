<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nythera Client</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;

-webkit-font-smoothing:antialiased;
-moz-osx-font-smoothing:grayscale;
text-rendering:optimizeLegibility;
}

body{
background:#02030a;
color:white;
}

.container{
max-width:1300px;
margin:auto;
padding:40px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:60px;
}

.logo{
display:flex;
align-items:center;
gap:14px;
font-size:28px;
font-weight:700;
}

.logo img{
width:48px;
border-radius:14px;
}

.nav{
display:flex;
gap:12px;
}

.btn{
padding:12px 22px;
border-radius:10px;
border:none;
cursor:pointer;
font-weight:600;
}

.btn-primary{
background:white;
color:black;
}

.btn-outline{
background:transparent;
border:1px solid #26273a;
color:white;
}

.hero h1{
font-size:64px;
font-weight:900;
margin-bottom:15px;
}

.hero p{
font-size:18px;
color:#9aa0b5;
max-width:700px;
line-height:1.6;
}

.card{
background:#070814;
border:1px solid #1c1d2e;
padding:30px;
border-radius:16px;
margin-top:25px;
}

.price{
font-size:22px;
margin:8px 0;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
display:none;
justify-content:center;
align-items:center;
}

.popup-content{
background:#05060f;
padding:30px;
border-radius:14px;
width:420px;
border:1px solid #1c1d2e;
}

.input{
width:100%;
padding:14px;
margin-bottom:10px;
background:#02030a;
border:1px solid #1c1d2e;
border-radius:8px;
color:white;
}

</style>
</head>

<body>

<div class="container">

<header>
<div class="logo">
<img src="logo.png">
Nythera
</div>

<div class="nav">
<button class="btn btn-outline" onclick="openLogin()">Войти</button>
<button class="btn btn-primary" onclick="openBuy()">Купить</button>
</div>
</header>

<div class="hero">
<h1>Nythera Client</h1>
<p>Приватный premium клиент для Minecraft Fabric с обходами и визуалами.</p>
</div>

<div class="card">
<h2>Прайс</h2>

<div class="price">Месяц — 79₽</div>
<button class="btn btn-primary" onclick="buyRole('month')">Купить</button>

<br><br>

<div class="price">Год — 289₽</div>
<button class="btn btn-primary" onclick="buyRole('year')">Купить</button>

<br><br>

<div class="price">Навсегда — 599₽</div>
<button class="btn btn-primary" onclick="buyRole('lifetime')">Купить</button>

<br><br>

<button class="btn btn-outline" onclick="openActivate()">Активировать ключ</button>

</div>

</div>

<div class="popup" id="login">
<div class="popup-content">
<h3>Войти / Регистрация</h3>
<input id="username" class="input" placeholder="Username">
<input id="password" class="input" placeholder="Password">
<button class="btn btn-primary" style="width:100%" onclick="login()">Войти</button>
</div>
</div>

<div class="popup" id="activate">
<div class="popup-content">
<h3>Активация ключа</h3>
<input id="keyInput" class="input" placeholder="Nythera-XXXX-7d">
<button class="btn btn-primary" style="width:100%" onclick="activate()">Активировать</button>
</div>
</div>

<script>

const VALID_KEYS = {
"Nythera-ABCD123456-7d":"month",
"Nythera-ZXCV987654-1m":"month",
"Nythera-QWER123123-1y":"year"
}

let currentUser = null

function openLogin(){
document.getElementById("login").style.display="flex"
}

function openBuy(){
alert("Сначала войдите")
openLogin()
}

function openActivate(){
document.getElementById("activate").style.display="flex"
}

function login(){

let user=document.getElementById("username").value
let pass=document.getElementById("password").value

if(!localStorage.getItem(user)){
localStorage.setItem(user,JSON.stringify({
password:pass,
role:"user"
}))
}

let data=JSON.parse(localStorage.getItem(user))

if(data.password===pass){
currentUser=user
alert("Вход выполнен")
}else{
alert("Неверный пароль")
}

}

function buyRole(role){

if(!currentUser){
openLogin()
return
}

let data=JSON.parse(localStorage.getItem(currentUser))

data.role=role

localStorage.setItem(currentUser,JSON.stringify(data))

alert("Выдана роль: "+role)

}

function activate(){

let key=document.getElementById("keyInput").value

if(!VALID_KEYS[key]){
alert("Ключ недействителен")
return
}

let role=VALID_KEYS[key]

let data=JSON.parse(localStorage.getItem(currentUser))
data.role=role

localStorage.setItem(currentUser,JSON.stringify(data))

alert("Ключ активирован. Роль: "+role)

}

</script>

</body>
</html>
